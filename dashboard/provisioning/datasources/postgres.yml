apiVersion: 1

datasources:
  - name: AI-Obs PostgreSQL
    type: postgres
    uid: aiobs-pg
    url: postgres:5432
    user: aiobs
    secureJsonData:
      password: "${POSTGRES_PASSWORD}"
    jsonData:
      database: aiobs
      sslmode: disable
      maxOpenConns: 10
      maxIdleConns: 5
      connMaxLifetime: 14400
      postgresVersion: 1600
      timescaledb: false
    isDefault: true
    editable: false
